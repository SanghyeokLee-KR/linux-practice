# Samba share configuration example
# File path on server: /etc/samba/smb.conf
#
# This file contains the share configuration used in this practice.
# In the actual server, add the [share] block below to the end of /etc/samba/smb.conf.

[share]
    comment = Samba Share Directory
    path = /srv/samba/share
    browseable = yes
    read only = no
    writable = yes
    guest ok = no
    valid users = sambauser
    create mask = 0777
    directory mask = 0777
